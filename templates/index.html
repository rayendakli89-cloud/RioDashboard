<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول | ريو بوت</title>
    <style>
        body { 
            background: #23272a; 
            color: white; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .card {
            background: #2c2f33;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }
        h1 { margin-bottom: 10px; font-size: 2rem; }
        p { color: #b9bbbe; margin-bottom: 30px; }
        .btn { 
            background: #5865F2; 
            color: white; 
            padding: 15px 40px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            transition: 0.3s;
            display: inline-block;
        }
        .btn:hover { 
            background: #4752c4; 
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>مرحباً بك في ديشبورد ريو بوت 🚀</h1>
        <p>لإدارة سيرفراتك وتخصيص الأوامر، يرجى تسجيل الدخول</p>
        <a href="/login" class="btn">تسجيل الدخول عبر ديسكورد</a>
    </div>
</body>
</html>

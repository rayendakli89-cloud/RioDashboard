<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <style>
        body { background: #23272a; color: white; font-family: sans-serif; padding: 20px; }
        .guild-card { background: #2c2f33; padding: 15px; margin: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #444; }
        .btn-manage { background: #43b581; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>سيرفراتك التي تمتلك فيها صلاحيات الإدارة:</h1>
    <hr>
    {% for guild in guilds %}
    <div class="guild-card">
        <span>{{ guild.name }}</span>
        <a href="/settings/{{ guild.id }}" class="btn-manage">إدارة السيرفر</a>
    </div>
    {% endfor %}
</body>
</html>
